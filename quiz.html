<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اختبار الميول الهندسية</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Cairo', sans-serif;
}
body {
    background: #fffdf7;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
}

/* Overlay */
.system-overlay {
    position: fixed;
    inset: 0;
    background: #fffdf7;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition: 1s ease;
}
.control-panel {
    background: #17110d;
    padding: 50px;
    border-radius: 25px;
    text-align: center;
    width: 420px;
    color: white;
    box-shadow: 0 0 40px rgba(255,111,0,0.2);
}
.control-panel h2 {
    color: #ff6f00;
    margin-bottom: 10px;
}
#systemStatus {
    margin-bottom: 20px;
    color: #aaa;
}
.lights {
    display: flex;
    justify-content: center;
    gap: 15px;
    margin-bottom: 20px;
}
.light {
    width: 15px;
    height: 15px;
    border-radius: 50%;
    background: #333;
    transition: 0.3s;
}
.light.active {
    background: #ff6f00;
    box-shadow: 0 0 10px #ff6f00;
}
.loader {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 20px;
    overflow: hidden;
    margin-bottom: 25px;
}
.loader-bar {
    width: 0%;
    height: 100%;
    background: #ff6f00;
    transition: 0.3s;
}
.activate-btn {
    padding: 12px 30px;
    border: none;
    border-radius: 30px;
    background: #ff6f00;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}
.activate-btn:hover {
    background: #e65100;
}

/* Quiz */
.quiz-container {
    width: 600px;
    background: white;
    padding: 40px;
    border-radius: 25px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.08);
    display: flex;
    flex-direction: row-reverse;
    align-items: flex-start;
    gap: 20px;
    position: relative;
}
.progress-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
}
.quiz-percentage {
    font-weight: bold;
    font-size: 18px;
    color: #333;
}
.progress-vertical {
    width: 15px;
    height: 350px;
    background: #eee;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
}
.progress-bar {
    width: 100%;
    height: 0%;
    position: absolute;
    bottom: 0;
    border-radius: 20px;
    background: linear-gradient(to top, #ff6f00, #ffd180);
    transition: 0.4s;
}
.quiz-content {
    flex: 1;
    text-align: right;
    position: relative;
}
.quiz-content h2 {
    color: #ff6f00;
    margin-bottom: 10px;
}
.question {
    font-size: 20px;
    margin-bottom: 20px;
    color: #333;
    text-align: right;
}
.options button {
    width: 100%;
    padding: 15px;
    margin-bottom: 15px;
    border: none;
    border-radius: 15px;
    background: #fff3e0;
    cursor: pointer;
    transition: 0.3s;
    font-size: 16px;
    text-align: right;
}
.options button:hover {
    background: #ffe0b2;
    transform: translateY(-3px);
}
.options button.selected {
    background: #ffcc80;
}
.next-btn {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 20px;
    background: #ff6f00;
    color: white;
    font-size: 16px;
    cursor: pointer;
    margin-top: 10px;
    display: none;
    transition: 0.3s;
}
.next-btn:hover {
    background: #e65100;
}

/* Previous button */
.prev-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
    background-color: #f7ab75; /* اللون الغامق */
    border-radius: 15px;
    padding: 10px 15px;
    border: none;
    cursor: pointer;
    font-size: 15px;
    margin-bottom: 15px;
    color: white;
    width: 115%; /* نفس عرض البكس */
    transition: 0.3s;
    position: absolute;
    top: -100px; /* فوق البكس */
    right: 0;
}
.prev-btn:hover {
    background-color: #f8d1af; /* فاتح عند المرور */
}
.prev-btn:active {
    background-color: #777; /* عند الضغط يصبح أفتح */
}
.prev-btn span {
    transform: rotate(0deg); /* السهم للجهة العكس */
}

.result-prev-btn {
    width: 100%;
    max-width: 600px;       
    background-color: #17110d; 
    color: white;
    top: -60px;
    position: absolute;
    border-radius: 15px;
    padding: 10px 15px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: flex-end;
    font-size: 16px;
    transition: 0.3s;
}
.result-prev-btn:hover {
    background-color: #555;
}
.result-prev-btn:active {
    background-color: #777;
}

/* --- Result --- */
.result-container {
    width: 600px;
    background: #17110d;
    padding: 50px;
    border-radius: 25px;
    text-align: center;
    color: white;
    box-shadow: 0 0 40px rgba(255,111,0,0.2);
    position: relative;
}

.result-container h2 {
    color: #ff6f00;
    margin-bottom: 20px;
}

.gears {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 15px;
    flex-wrap: wrap;
    margin-top: 20px;
}

.gears span {
    font-size: 20px;
    display: inline-block;
    animation: spinGear 1s linear infinite;
}

@keyframes spinGear {
    0% { transform: rotate(0deg); }
    50% { transform: rotate(20deg); }
    100% { transform: rotate(0deg); }
}

.result-text {
    font-size: 18px;
    color: #ccc;
    margin-top: 20px;
}

.result-field {
    font-size: 28px;
    font-weight: bold;
    color: #ff6f00;
    margin-top: 10px;
    display: none;
}
</style>
</head>
<body>

<div class="system-overlay" id="systemOverlay">
    <div class="control-panel">
        <h2>نظام تحليل الميول الهندسية</h2>
        <p id="systemStatus">الحالة: غير مفعل</p>
        <div class="lights">
            <span class="light"></span>
            <span class="light"></span>
            <span class="light"></span>
            <span class="light"></span>
        </div>
        <div class="loader">
            <div class="loader-bar" id="loaderBar"></div>
        </div>
        <button class="activate-btn" id="activateBtn">تشغيل النظام</button>
    </div>
</div>

<div class="quiz-container">
    <div class="progress-container">
        <div class="quiz-percentage" id="quizPercentage">0%</div>
        <div class="progress-vertical">
            <div class="progress-bar" id="progressBar"></div>
        </div>
    </div>
    <div class="quiz-content">
        <h2>اختبار تحديد التخصص الهندسي</h2>
        <button class="prev-btn" id="prevBtn"><span>➔</span> السؤال السابق</button>
        <div class="question" id="question"></div>
        <div class="options" id="options"></div>
        <button class="next-btn" id="nextBtn">التالي</button>
    </div>
</div>

<script>
const activateBtn = document.getElementById("activateBtn");
const systemOverlay = document.getElementById("systemOverlay");
const systemStatus = document.getElementById("systemStatus");
const lights = document.querySelectorAll(".light");
const loaderBar = document.getElementById("loaderBar");

activateBtn.onclick = () => {
    activateBtn.disabled = true;
    systemStatus.innerText = "جاري تهيئة النظام...";
    let progress = 0;
    let lightIndex = 0;
    const interval = setInterval(() => {
        progress += 5;
        loaderBar.style.width = progress + "%";
        if(lightIndex < lights.length){
            lights[lightIndex].classList.add("active");
            lightIndex++;
        }
        if(progress >= 100){
            clearInterval(interval);
            systemStatus.innerText = "تم تفعيل النظام ✔";
            setTimeout(() => {
                systemOverlay.style.opacity = "0";
                setTimeout(() => { systemOverlay.style.display = "none"; }, 1000);
            }, 1000);
        }
    }, 150);
};

const questions = [
{question:"أثناء الدراسة، أي نوع مسائل تستمتع بحله أكثر؟", options:["مسائل فيها أطوال وأبعاد وأحجام","مسائل فيها دوائر كهربائية ومعادلات رمزية","كلاهما"]},
{question:"تحب تذاكر مادة تركز على؟", options:["تحليل القوى والأحمال على المباني","تحليل التيار والجهد في الدوائر","كلاهما"]},
{question:"تميل أكثر إلى فهم؟", options:["كيف تتحمل المواد الضغط والشد","كيف تنتقل الطاقة داخل الأسلاك","كلاهما"]},
{question:"أي نوع رسم تفضله أكثر؟", options:["مخططات هندسية لمباني","مخططات دوائر كهربائية","كلاهما"]},
{question:"في الفيزياء، تستمتع أكثر بـ؟", options:["الميكانيكا والاستاتيكا","الكهرباء والمغناطيسية","كلاهما"]},
{question:"تحب المواد التي تعتمد على؟", options:["القياسات الواقعية والأبعاد","التحليل الرياضي المجرد","كلاهما"]},
{question:"أي مادة تشوف نفسك متحمس لها أكثر؟", options:["هندسة المواد وميكانيكا المنشآت","إلكترونيات وأنظمة تحكم","كلاهما"]},
{question:"تحب دراسة الأنظمة التي؟", options:["يمكنك رؤيتها وبناؤها على أرض الواقع","تعمل خلف الكواليس داخل الأجهزة","كلاهما"]},
{question:"ماذا تفضل أكثر؟", options:["أشياء ملموسة تقدر تشوفها وتلمسها","أنظمة غير مرئية لكنها تتحكم بكل شيء"]}
];

let currentQuestion = 0;
let userAnswers = [];

const questionEl = document.getElementById("question");
const optionsEl = document.getElementById("options");
const nextBtn = document.getElementById("nextBtn");
const prevBtn = document.getElementById("prevBtn");
const progressBar = document.getElementById("progressBar");
const quizPercentage = document.getElementById("quizPercentage");

function loadQuestion() {
    const q = questions[currentQuestion];
    questionEl.innerText = q.question;
    optionsEl.innerHTML = "";
    nextBtn.style.display = "none";
    prevBtn.style.display = currentQuestion > 0 ? "flex" : "none";

    q.options.forEach(option => {
        const button = document.createElement("button");
        button.innerText = option;
        button.onclick = () => {
            document.querySelectorAll(".options button").forEach(btn => btn.classList.remove("selected"));
            button.classList.add("selected");
            nextBtn.style.display = "block";
        };
        optionsEl.appendChild(button);
    });

    let percent = (currentQuestion) * 10;
    quizPercentage.innerText = percent + "%";
    progressBar.style.height = percent + "%";

    if(userAnswers[currentQuestion]){
        document.querySelectorAll(".options button").forEach(btn => {
            if(btn.innerText === userAnswers[currentQuestion]) btn.classList.add("selected");
        });
        nextBtn.style.display = "block";
    }
}

nextBtn.onclick = () => {
    const selected = document.querySelector(".options button.selected");
    if(selected){
        userAnswers[currentQuestion] = selected.innerText;
        currentQuestion++;
        if(currentQuestion < questions.length){
            loadQuestion();
        } else {
            quizPercentage.innerText = "100%";
            progressBar.style.height = "100%";
            showResult();
        }
    }
};

prevBtn.onclick = () => {
    if(currentQuestion > 0){
        currentQuestion--;
        loadQuestion();
    }
};

function showResult() {
    systemOverlay.style.display = "flex";
    systemOverlay.style.opacity = "1";

    let scoreCivil = 0;
    let scoreElectrical = 0;

    for(let i=0;i<questions.length;i++){
        const ans = userAnswers[i];
        if(i < questions.length - 1){
            if(ans === questions[i].options[0]) scoreCivil += 1;
            else if(ans === questions[i].options[1]) scoreElectrical += 1;
            else { scoreCivil += 1; scoreElectrical += 1; }
        } else {
            if(ans === questions[i].options[0]) scoreCivil += 2;
            else if(ans === questions[i].options[1]) scoreElectrical += 2;
        }
    }

    let finalField = scoreCivil > scoreElectrical 
        ? "الهندسة المدنية 🏗️" 
        : "الهندسة الكهربائية ⚡";

    systemOverlay.innerHTML = `
        <div class="result-container">
            <h2>تخصصك الهندسي هو:</h2>
           <button class="prev-btn result-prev-btn" id="resultPrevBtn"><span>➔</span> الرجوع لآخر سؤال</button>
            <div class="gears" id="gears"></div>
            <div class="result-text" id="resultText">
                جاري إظهار التخصص المناسب وفقًا لإجاباتك...
            </div>
            <div class="result-field" id="resultField">
                ${finalField}
            </div>
        </div>
    `;

    document.getElementById("resultPrevBtn").onclick = () => {
        systemOverlay.style.opacity = "0";
        setTimeout(() => { systemOverlay.style.display = "none"; currentQuestion = questions.length - 1; loadQuestion(); }, 500);
    };

    const gearsEl = document.getElementById("gears");
    const resultText = document.getElementById("resultText");
    const resultField = document.getElementById("resultField");
    resultField.style.display="none";

    const gearCount = 5;
    let currentGear = 0;
    const gearInterval = setInterval(()=>{
        if(currentGear < gearCount){
            const span = document.createElement("span");
            span.innerText = "⚙️";
            gearsEl.appendChild(span);
            currentGear++;
        } else {
            clearInterval(gearInterval);
        }
    }, 1600);

    setTimeout(()=>{
        resultText.style.display = "none";
        resultField.style.display = "block";
    }, 8000);
}

loadQuestion();
</script>
</body>
</html>
