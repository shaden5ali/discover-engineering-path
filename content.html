<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تواصل معنا | مسارك الهندسي</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Cairo', sans-serif;
}

body{
    background:#fffdf7;
    overflow-x:hidden;
    position:relative;
}

/* ================= الدوائر الزخرفية ================= */
body::before{
    content:"";
    position:absolute;
    width:450px;
    height:450px;
    left:-150px;
    top:-150px;
    background:radial-gradient(circle,#ffb300 0%, #ff6f00 70%);
    border-radius:50%;
    opacity:0.15;
    z-index:0;
    animation: floatSlow 8s ease-in-out infinite;
}

body::after{
    content:"";
    position:absolute;
    width:350px;
    height:350px;
    right:-120px;
    bottom:-120px;
    background:radial-gradient(circle,#ff9800 0%, #ff6f00 70%);
    border-radius:50%;
    opacity:0.12;
    z-index:0;
    animation: floatSlow 10s ease-in-out infinite;
}

@keyframes floatSlow{
    0%{transform:translateY(0);}
    50%{transform:translateY(-20px);}
    100%{transform:translateY(0);}
}

/* ================= الهيدر ================= */
header{
    padding:20px 40px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    z-index:2;
}

.logo{
    font-size:22px;
    font-weight:800;
    color:#ff6f00;
}

nav a{
    text-decoration:none;
    color:#555;
    margin-right:20px;
    font-weight:600;
    position:relative;
}

nav a::after{
    content:"";
    position:absolute;
    width:0;
    height:2px;
    background:#ff6f00;
    bottom:-5px;
    right:0;
    transition:0.3s;
}

nav a:hover::after{
    width:100%;
}

/* ================= القسم الرئيسي ================= */
.contact-section{
    min-height:85vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px;
}

.contact-box{
    max-width:650px;
    animation: fadeIn 1.5s ease;
}

.contact-box h1{
    font-size:40px;
    color:#ff6f00;
    margin-bottom:20px;
}

.contact-box p{
    font-size:18px;
    color:#555;
    line-height:1.9;
    margin-bottom:35px;
}

/* ===== الايقونات ===== */
.social-icons{
    display:flex;
    justify-content:center;
    gap:30px;
}

.social-icons a{
    width:70px;
    height:70px;
    display:flex;
    align-items:center;
    justify-content:center;
    border-radius:50%;
    font-size:28px;
    color:white;
    background:linear-gradient(135deg,#f9f7f6,#f4d892);
    transition:0.4s;
    text-decoration:none;
}

.social-icons a:hover{
    transform:scale(1.1);
    box-shadow:0 10px 25px rgba(255,111,0,0.4);
}

@keyframes fadeIn{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* ===== الجوال ===== */
@media(max-width:900px){
    header{
        flex-direction:column;
        gap:10px;
        text-align:center;
    }

    .contact-box h1{
        font-size:28px;
    }
}
</style>
</head>
<body>

<div class="extra-circle"></div>

<header>
   <div class="logo"> انتم المستقبل</div>
    <nav>
        <a href="index.html">الرئيسية</a>
        <a href="sours.html">عن الموقع</a>
        <a href="content.html">تواصل معنا</a>
    </nav>
</header>

<section class="contact-section">
    <div class="contact-box">
        <h1>مهندساتنا ومهندسينا المبدعون</h1>
        <p>
        للتواصل أو للاستفسار عن أي سؤال، أو لطلب تحديث الأسئلة بما يتوافق مع مقرراتكم الدراسية،
        يسعدنا تواصلكم معنا في أي وقت.
        </p>

        <div class="social-icons">
            <a href="https://wa.me/966546575405" target="_blank">
                <i class="fab fa-whatsapp"></i>
            </a>
            <a href="https://www.instagram.com/shli8z/?hl=en" target="_blank">
                <i class="fab fa-instagram"></i>
            </a>
        </div>
    </div>
</section>

</body>
</html>
